name: Validate Cursor plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Validate manifest and frontmatter
        run: node scripts/validate-plugin.mjs .

      - name: Install dependencies (reproducible)
        run: npm ci

      - name: Verify MCP entrypoint exists
        run: test -f mcp/server.mjs
